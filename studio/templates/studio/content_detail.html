{% extends 'studio/base.html' %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto; padding: 20px;">
    <h1>{{ content.get_content_type_display }}</h1>
    <p style="color: #888;">Generated on {{ content.created_at|date:"M d, Y" }} • {{ content.word_count }} words</p>
    
    <div class="card" style="white-space: pre-wrap; font-size: 16px; line-height: 1.6;">
        {{ content.generated_text }}
    </div>
    
    <button onclick="copyContent()" class="btn" style="background: #28a745;">📋 Copy</button>
    <a href="{% url 'dashboard' %}" class="btn" style="background: #6c757d; margin-left: 10px;">← Back</a>
</div>

<script>
function copyContent() {
    let text = document.querySelector('.card').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert('✅ Content copied to clipboard!');
    });
}
</script>
{% endblock %}
